<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>AIC-25</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>
        <div class="top-panel">
            <div class="left-buttons">
                <div class="setting" id="btn-open" style="cursor: pointer;"> ⚙ Color </div>
            </div>
            <div id="modal-container">
                <div class="modal" id="modal-demo">
                    <div class="modal-header">
                        <h3>Background Colors</h3>
                        <button id="btn-close"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="modal-body">
                        <label>Background Color</label>
                            <span><input type="text" id="mau"></span>
                            <span><input type="submit" id="sub_btn" value="Save"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="left-panel">
            <div class="search-area">
                <table>
                    <tr>
                        <td>
                            <input type="text" id="key_query" class="search-box">
                        </td>
                        <td>
                            <button type="button" class="search-box" style="cursor: pointer;" id="search_button" onClick="Searching()">🔍</button>
                        </td>
                    </tr>
                </table>
                <div class="param-enter">
                    <label class="label-number">
                        <span>Top K</span>
                        <input type="number" class="num-input" id="topk">
                    </label>
                </div>
                <div class="param-enter">
                    <label class="label-text">
                        <span>Collection</span>
                        <input type="text" class="text-input" id="collection">
                    </label>
                </div>
                <div class="wrapper">
                    <details name="advanced-setting">
                        <summary>Advanced settings</summary>
                        <div class="checkbox-grid">
                            <div class="selection">
                                <label for="search-mode"></label>
                                <select name="search-mode" id="search-mode">
                                    <option value="normal-search">Normal search</option>
                                    <option value="range-search">Range search</option>
                                    <option value="grouping-search">Grouping search</option>
                                </select>                            
                            </div>
                            <div id="range-search" class="hideable">
                                <label for="radius">
                                    <span>Radius</span>
                                    <input id="radius" type="number">
                                </label>

                                <label for="range-filter">
                                    <span>Range filter</span>
                                    <input id="range-filter" type="number">
                                </label>
                            </div>
                            <div id="grouping-search" class="hideable">
                                <label for="group-by-field">
                                    <span>Group by field</span>
                                    <input id="group-by-field" type="text">
                                </label>

                                <label for="group-size">
                                    <span>Group size</span>
                                    <input id="group-size" type="number">
                                </label>

                                <label for="strict-group-size">
                                    <span>Strict group size</span>
                                    <input id="strict-group-size" type="checkbox">
                                </label>
                                
                            </div>
                        </div>
                    </details>
                </div>
            </div>
            <div class="filter-options">
                <p class="title"><strong>FILTERS</strong></p>
                <label for="video_id">
                    <input type="checkbox" id="video_id" class="option">
                    <span class="option-name">video_id</span>
                    <input type="number" class="num-input">
                </label>

                <label for="frame_id">
                    <input type="checkbox" id="frame_id" class="option">
                    <span class="option-name">frame_id</span>
                    <input type="number" class="num-input">
                </label>
                
                <label for="time_order">
                    <input type="checkbox" id="time_order" class="option">
                    <span class="option-name">time_order</span>
                    <input type="number" class="num-input">
                </label>
                
                <label for="frame_order">
                    <input type="checkbox" id="frame_order" class="option">
                    <span class="option-name">frame_order</span>
                    <input type="number" class="num-input">
                </label>

                <label for="answer_key">
                    <input type="checkbox" id="answer_key" class="option">
                    <span class="option-name">answer_key</span>
                    <input type="number" class="num-input">
                </label>

                <label for="youtube_link">
                    <input type="checkbox" id="youtube_link" class="option">
                    <span class="option-name">youtube_link</span>
                    <input type="number" class="num-input">
                </label>

                <label for="publish_date">
                    <input type="checkbox" id="publish_date" class="option">
                    <span class="option-name">publish_date</span>
                    <input type="number" class="num-input">
                </label>
            </div>
        </div>

        <div class="middle-panel">
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
            <div class="box"><div class="rotate"></div><div class="oval"></div></div>
        </div>

        <div class="right-panel">
            <p class="title"><strong>RECHECK</strong></p>
            <section class="image-display">
                <div class="box"><div class="rotate"></div><div class="oval"></div></div>
                <div class="box"><div class="rotate"></div><div class="oval"></div></div>
                <div class="box"><div class="rotate"></div><div class="oval"></div></div> 
                <div class="box"><div class="rotate"></div><div class="oval"></div></div>      
                <div class="box"><div class="rotate"></div><div class="oval"></div></div> 
                <div class="box"><div class="rotate"></div><div class="oval"></div></div> 
                <div class="box"><div class="rotate"></div><div class="oval"></div></div> 
                <div class="box"><div class="rotate"></div><div class="oval"></div></div> 
            </section>
            <button class='submit-button'>SUBMIT</button>
        </div>

        <script type="text/javascript" src="js/script.js"></script>
    </body>
</html>
