<!--Cột đầu-->
<div class="main-content">
    <!--Tìm kiếm-->
    <div class="panel left-panel">
        <div class="search-box">
            <span>🔍</span>
            <span>x</span>
        </div>
    <!--Top K-->
    <div class="label">
        <label class="label-number">Top K:</label>
        <input type="number" class="num-input">
    </div>
    <!--Collection-->
    <div class="label">
        <label class="label-text">Collection:</label>
        <input type="text" class="text-input">
    </div>

    
     <!--Chọn-->
    <div class="frame-options">
        <div class="option">
            <span>answer_key</span>

        </div>
        <div class="option">
            <span>frame_id</span>
            <div class="toggle"></div>
        </div>
        <div class="option">

        </div>
        <div class="option">

        <div class="option">

            <div class="toggle"></div>
        </div>
        <div class="option">
            <span>time_order</span>
            <div class="toggle"></div>
        </div>
        <div class="option">
            <span>video_id</span>
            <div class="toggle"></div>
        </div>
        <div class="option">
            <span>youtube_link</span>
